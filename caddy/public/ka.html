  .log-line.error .lvl { color:#fa746f; }
  .log-line .msg  { color:rgba(219,229,255,0.8); word-break:break-all; }

  .line-gutter {

    display: block;
  }
  .line-gutter span { display:block; text-align:center; line-height:1.625; }
  /* toasts */
  #toastContainer { position:fixed; bottom:1.25rem; right:1.25rem; z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
  .toast { display:flex; align-items:center; gap:10px; padding:10px 16px; border-radius:12px; border-width:1px; font-size:13px; font-weight:500; pointer-events:auto; box-shadow:0 8px 24px rgba(0,0,0,0.5); opacity:0; transform:translateY(6px); transition:opacity 0.18s ease, transform 0.18s ease; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.success { background:#071934; border-color:rgba(76,215,246,0.35); color:#4cd7f6; }
  .toast.error   { background:#071934; border-color:rgba(250,116,111,0.35); color:#fa746f; }
  .toast.warn    { background:#071934; border-color:rgba(250,204,21,0.35);  color:#facc15; }
  .toast.info    { background:#071934; border-color:rgba(150,171,214,0.25); color:#96abd6; }
  /* save button dirty state (unsaved changes pending) */
  button.dirty { color:#fb923c !important; background:rgba(251,146,60,0.1) !important; border-color:rgba(251,146,60,0.3) !important; }

<script>
window.SERVER_API_KEY = "5aa1a3…04d9";
const apiBase = window.location.origin || 'https://vps.karims.dev';

// ── Toasts ──
function toast(msg, type = 'info') {
  const icons = { success:'check_circle', error:'error', warn:'warning', info:'info' };
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = `<span class="material-symbols-outlined" style="font-size:17px">${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 200);
  }, 3200);
}

// ── Log ──
const LOG_MAX = 500;
function formatTS(d){ return d.toISOString().replace('T',' ').replace('Z',''); }
function appendLog(level, msg){
  const p = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-line ' + level.toLowerCase();
  line.innerHTML = `<span class="ts">${formatTS(new Date())}</span><span class="lvl">[${level}]</span><span class="msg">${msg}</span>`;
  p.appendChild(line);
  while(p.children.length > LOG_MAX) p.removeChild(p.firstChild);
  p.scrollTop = p.scrollHeight;
}
function logInfo(m)  { appendLog('INFO',  m); }
function logWarn(m)  { appendLog('WARN',  m); }
function logError(m) { appendLog('ERROR', m); }

// ── Line gutter ──
function scrollTABottom(taId) {
  const ta = document.getElementById(taId);
  ta.scrollTop = ta.scrollHeight;
}

function updateGutter(taId, gutterId) {
  const ta     = document.getElementById(taId);
  const gutter = document.getElementById(gutterId);
  const count  = ta.value ? ta.value.split('\n').length : 1;
  gutter.innerHTML = Array.from({length: count}, (_, i) => `<span>${i + 1}</span>`).join('');
  gutter.scrollTop = ta.scrollTop;
}

// ── API ──
async function req(path, method = 'GET', body = null){
  const key = document.getElementById('apiKey').value.trim();
  const headers = { 'Content-Type': 'application/json' };
  if(key) headers['X-API-Key'] = key;
  const opts = { method, headers, cache: 'no-store' };
  if(body) opts.body = JSON.stringify(body);
  const url = apiBase + path;
  try{
    logInfo('Fetching ' + url);
    const r = await fetch(url, opts);
    const text = await r.text();
    if(!r.ok){ logWarn('Non-OK ' + r.status + ' from ' + url); throw new Error(text || r.status); }
    logInfo('Success from ' + url);
    try{ return JSON.parse(text); } catch(e){ return text; }
  } catch(e){ logError('Fetch error ' + url + ': ' + e); throw e; }
}

function initEditorFromInline(){
  try{ if(typeof window.INIT_PHRASES === 'string' && window.INIT_PHRASES.length) document.getElementById('phrases').value = window.INIT_PHRASES; } catch(e){}
  try{ if(typeof window.INIT_DNC    === 'string' && window.INIT_DNC.length)    document.getElementById('dnc').value    = window.INIT_DNC;    } catch(e){}
}

// ── Load / Save ──
async function loadPhrases(){
  try{
    const {content} = await req('/admin/phrases');
    document.getElementById('phrases').value = content;
    updateGutter('phrases', 'gutterP');
    scrollTABottom('phrases');
    saveBackup();
    logInfo('Loaded phrases');
    toast('Phrases reloaded', 'success');
  } catch(e){
    logError('Failed to load phrases: ' + e);
    toast('Failed to reload phrases', 'error');
  }
}
async function loadDnc(){
  try{
    const {content} = await req('/admin/dnc');
    document.getElementById('dnc').value = content;
    updateGutter('dnc', 'gutterD');
    scrollTABottom('dnc');
    saveBackup();
    logInfo('Loaded DNC');
    toast('DNC reloaded', 'success');
  } catch(e){
    logError('Failed to load DNC: ' + e);
    toast('Failed to reload DNC', 'error');
  }
}
async function loadAll(){ logInfo('Loading all…'); await Promise.all([loadPhrases(), loadDnc()]); }

// ── Auto-save ──
const _autoTimers = {};
const AUTO_SAVE_DELAY = 1500;

function scheduleAutoSave(taId, saveFn) {
  const btn = document.getElementById(taId === 'phrases' ? 'saveP' : 'saveD');
  btn.classList.add('dirty');
  clearTimeout(_autoTimers[taId]);
  _autoTimers[taId] = setTimeout(() => saveFn(true), AUTO_SAVE_DELAY);
}

async function savePhrases(isAuto = false){
  clearTimeout(_autoTimers['phrases']);
  if(!isAuto) logInfo('Saving phrases…');
  try{
    await req('/admin/phrases', 'POST', {content: document.getElementById('phrases').value});
    saveBackup();
    logInfo('Saved phrases');
    toast(isAuto ? 'Phrases auto-saved' : 'Phrases saved', 'success');
    document.getElementById('saveP').classList.remove('dirty');
  } catch(e){
    logError('Save failed: ' + e);
    toast('Failed to save phrases', 'error');
  }
}
async function saveDnc(isAuto = false){
  clearTimeout(_autoTimers['dnc']);
  if(!isAuto) logInfo('Saving DNC…');
  try{
    await req('/admin/dnc', 'POST', {content: document.getElementById('dnc').value});
    logInfo('Saved DNC');
    toast(isAuto ? 'DNC auto-saved' : 'DNC saved', 'success');
    document.getElementById('saveD').classList.remove('dirty');
  } catch(e){
    logError('Save failed: ' + e);
    toast('Failed to save DNC', 'error');
  }
}

// ── Backup / Restore ──
function saveBackup() {
  localStorage.setItem('ss_bak_phrases', document.getElementById('phrases').value);
  localStorage.setItem('ss_bak_dnc',     document.getElementById('dnc').value);
  localStorage.setItem('ss_bak_time',    new Date().toISOString());
}

function restoreBackup() {
  const phrases = localStorage.getItem('ss_bak_phrases');
  const dnc     = localStorage.getItem('ss_bak_time') && localStorage.getItem('ss_bak_dnc');
  const time    = localStorage.getItem('ss_bak_time');
  if(phrases === null) { toast('No restore point found', 'warn'); return; }
  document.getElementById('phrases').value = phrases;
  document.getElementById('dnc').value     = localStorage.getItem('ss_bak_dnc') || '';
  updateGutter('phrases', 'gutterP'); scrollTABottom('phrases');
  updateGutter('dnc',     'gutterD'); scrollTABottom('dnc');
  logInfo('Restored from backup' + (time ? ' saved at ' + time : ''));
  toast('Restored to last checkpoint' + (time ? ' · ' + new Date(time).toLocaleTimeString() : ''), 'warn');
  scheduleAutoSave('phrases', savePhrases);
  scheduleAutoSave('dnc', saveDnc);
}

function importJson() {
  document.getElementById('jsonFileInput').click();
}

function handleJsonImport(file) {
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if(!data.phrases && !data.dnc) throw new Error('Missing phrases/dnc keys');
      saveBackup();
      if(Array.isArray(data.phrases)) {
        document.getElementById('phrases').value = data.phrases.join('\n');
        updateGutter('phrases', 'gutterP'); scrollTABottom('phrases');
      }
      if(Array.isArray(data.dnc)) {
        document.getElementById('dnc').value = data.dnc.join('\n');
        updateGutter('dnc', 'gutterD'); scrollTABottom('dnc');
      }
      logInfo('Imported from ' + file.name + (data.exported ? ' (exported ' + data.exported + ')' : ''));
      toast('Imported ' + file.name, 'success');
      scheduleAutoSave('phrases', savePhrases);
      scheduleAutoSave('dnc', saveDnc);
    } catch(err) {
      logError('Import failed: ' + err);
      toast('Invalid JSON — expected {phrases:[], dnc:[]}', 'error');
    }
  };
  reader.readAsText(file);
}

// ── Bulk actions ──
function normalize(){
  ['phrases','dnc'].forEach(id => {
    const ta = document.getElementById(id);
    const lines = ta.value.split('\n').map(l => l.trim().toLowerCase()).filter(Boolean);
    ta.value = [...new Set(lines)].join('\n');
  });
  updateGutter('phrases', 'gutterP');
  updateGutter('dnc', 'gutterD');
  scrollTABottom('phrases');
  scrollTABottom('dnc');
  logInfo('Normalized (lowercase + dedupe)');
  toast('Both lists normalized', 'info');
}

function exportJson(){
  const data = {
    phrases:  document.getElementById('phrases').value.split('\n').map(l => l.trim()).filter(Boolean),
    dnc:      document.getElementById('dnc').value.split('\n').map(l => l.trim()).filter(Boolean),
    exported: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), {href: url, download: 'ka-whisper-export.json'});
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  logInfo('Exported JSON');
  toast('JSON exported', 'info');
}

function clearLog(){ document.getElementById('log').textContent = ''; logInfo('Cleared log'); }

function downloadLog(){
  const p     = document.getElementById('log');
  const lines = Array.from(p.children).map(el => el.textContent).reverse().join('\n');
  const blob  = new Blob([lines], {type: 'text/plain'});
  const url   = URL.createObjectURL(blob);
  const a     = Object.assign(document.createElement('a'), {href: url, download: 'ka-whisper-log.txt'});
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  logInfo('Downloaded log');
}

function addLine(inputId, taId, gutterId){
  const input = document.getElementById(inputId);
  const val   = input.value.trim();
  if(!val) return;
  const ta    = document.getElementById(taId);
  ta.value    = ta.value ? ta.value.trimEnd() + '\n' + val : val;
  input.value = '';
  updateGutter(taId, gutterId);
  scrollTABottom(taId);
  logInfo('Added to ' + taId + ': ' + val);
  scheduleAutoSave(taId, taId === 'phrases' ? savePhrases : saveDnc);
}

// Auth guard — redirect to login if no valid session
fetch('/auth/verify', { credentials: 'include' })
  .then(r => { if (!r.ok) window.location.replace('/login.html'); })
  .catch(() => window.location.replace('/login.html'));

async function logout() {
  await fetch('/auth/logout', { method: 'POST', credentials: 'include' }).catch(() => {});
  window.location.replace('/login.html');
}

document.addEventListener('DOMContentLoaded', function(){
  // Button wiring
  document.getElementById('loadP').addEventListener('click', loadPhrases);
  document.getElementById('saveP').addEventListener('click', savePhrases);
  document.getElementById('loadD').addEventListener('click', loadDnc);
  document.getElementById('saveD').addEventListener('click', saveDnc);
  document.getElementById('normalize').addEventListener('click', normalize);
  document.getElementById('exportJson').addEventListener('click', exportJson);
  document.getElementById('importJson').addEventListener('click', importJson);
  document.getElementById('restoreBtn').addEventListener('click', restoreBackup);
  document.getElementById('jsonFileInput').addEventListener('change', e => { handleJsonImport(e.target.files[0]); e.target.value = ''; });
  document.getElementById('downloadLog').addEventListener('click', downloadLog);
  document.getElementById('clearLog').addEventListener('click', clearLog);
  document.getElementById('addPhraseBtn').addEventListener('click', () => addLine('addPhraseInput', 'phrases', 'gutterP'));
  document.getElementById('addDncBtn').addEventListener('click',    () => addLine('addDncInput',    'dnc',     'gutterD'));
  document.getElementById('addPhraseInput').addEventListener('keydown', e => { if(e.key==='Enter') addLine('addPhraseInput','phrases','gutterP'); });
  document.getElementById('addDncInput').addEventListener('keydown',    e => { if(e.key==='Enter') addLine('addDncInput',   'dnc',    'gutterD'); });

  // Gutter sync
  const phrasesTA = document.getElementById('phrases');
  const dncTA     = document.getElementById('dnc');
  const gutterP   = document.getElementById('gutterP');
  const gutterD   = document.getElementById('gutterD');
  phrasesTA.addEventListener('input',  () => { updateGutter('phrases', 'gutterP'); scheduleAutoSave('phrases', savePhrases); });
  phrasesTA.addEventListener('scroll', () => { gutterP.scrollTop = phrasesTA.scrollTop; });
  dncTA.addEventListener('input',  () => { updateGutter('dnc', 'gutterD'); scheduleAutoSave('dnc', saveDnc); });
  dncTA.addEventListener('scroll', () => { gutterD.scrollTop = dncTA.scrollTop; });
  updateGutter('phrases', 'gutterP');
  updateGutter('dnc', 'gutterD');

  initEditorFromInline();
  loadAll();
});
</script>
